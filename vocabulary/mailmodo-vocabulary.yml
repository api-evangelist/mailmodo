name: mailmodo
description: >-
  Controlled vocabulary mapping Mailmodo's operational and capability
  dimensions to the API Evangelist common taxonomy.
dimensions:
  domain:
    - Email
    - Marketing
    - InteractiveEmail
    - Automation
  data:
    - Contact
    - ContactList
    - Campaign
    - Template
    - Event
    - Report
  capabilities:
