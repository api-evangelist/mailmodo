apiVersion: naftiko.dev/v1
kind: SharedCapabilities
metadata:
  name: mailmodo-shared
  provider: mailmodo
  description: Shared per-operation capabilities derived from the Mailmodo REST API.
spec:
  capabilities:
    - id: mailmodo.contacts.add
      summary: Add or update a contact in a Mailmodo list.
      operationId: addContactToList
      method: POST
      path: /api/v1/addToList
    - id: mailmodo.contacts.add_batch
      summary: Add a batch of contacts to a list.
      operationId: addContactsToListBatch
      method: POST
      path: /api/v1/addToList/batch
    - id: mailmodo.contacts.remove
      summary: Remove a contact from a list.
      operationId: removeContactFromList
      method: POST
      path: /api/v1/removeFromList
    - id: mailmodo.contacts.unsubscribe
      summary: Unsubscribe a contact across the workspace.
      operationId: unsubscribeContact
      method: POST
      path: /api/v1/contacts/unsubscribe
    - id: mailmodo.contacts.resubscribe
      summary: Resubscribe a previously unsubscribed contact.
      operationId: resubscribeContact
      method: POST
      path: /api/v1/contacts/resubscribe
    - id: mailmodo.contacts.archive
      summary: Archive a contact from the workspace.
      operationId: archiveContact
      method: DELETE
      path: /api/v1/contacts
    - id: mailmodo.contacts.get
      summary: Fetch a contact's profile and list membership.
      operationId: getContactDetails
      method: GET
      path: /api/v1/getContactDetails
    - id: mailmodo.lists.list
      summary: List all named contact lists.
      operationId: getAllContactLists
      method: GET
      path: /api/v1/getAllContactLists
    - id: mailmodo.campaigns.trigger
      summary: Trigger a transactional campaign to one recipient.
      operationId: triggerCampaign
      method: POST
      path: /api/v1/triggerCampaign/{campaignId}
    - id: mailmodo.campaigns.bulk_trigger
      summary: Bulk-trigger a campaign to many recipients.
      operationId: bulkTriggerCampaign
      method: POST
      path: /api/v1/bulktriggerCampaign/{campaignId}
    - id: mailmodo.campaigns.list
      summary: List campaigns configured on the workspace.
      operationId: listCampaigns
      method: GET
      path: /api/v1/campaigns
    - id: mailmodo.campaigns.report
      summary: Fetch delivery, engagement, and AMP form submission metrics for a campaign.
      operationId: getCampaignReport
      method: POST
      path: /api/v1/campaignReports/{campaignId}
    - id: mailmodo.templates.list
      summary: List interactive AMP-for-Email templates.
      operationId: listTemplates
      method: GET
      path: /api/v1/getAllTemplates
    - id: mailmodo.events.add
      summary: Send a custom event into Mailmodo journeys and segments.
      operationId: addEvent
      method: POST
      path: /api/v1/addEvent
