apis:
  - aid: mailmodo:rest-api
    name: Mailmodo REST API
    description: >-
      REST API for managing contacts, contact lists, custom events, campaigns, templates, and campaign reports. Used to
      drive transactional sends, bulk triggers, journey enrollment, and AMP-for-Email interactive campaigns.
      Authentication is via an API key issued from the Mailmodo dashboard and passed in the `mmApiKey` request header.
    humanURL: https://www.mailmodo.com/developers/
    baseURL: https://api.mailmodo.com
