aid: mailmodo
name: Mailmodo
description: >-
  Mailmodo is an AI-powered interactive email marketing and automation platform headquartered in Bengaluru with a
  presence in San Francisco. It pioneered AMP-for-Email at scale, letting brands embed forms, quizzes, polls, carousels,
  and calendars directly inside the inbox to drive engagement and conversions without a landing-page round-trip. The
  platform layers AI assistance on top of campaigns, journeys, segmentation, and analytics, and exposes a REST API for
  contact management, transactional sends, broadcast and bulk triggers, custom event ingestion, and campaign reporting.
type: Index
